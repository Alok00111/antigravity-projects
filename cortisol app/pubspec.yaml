name: cortisol_app
description: "Scan your face. Get roasted by science."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0
  flutter: ">=3.29.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Camera & ML
  camera: ^0.11.1
  google_mlkit_face_detection: ^0.12.0
  image: ^4.8.0

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  google_sign_in: ^6.2.2

  # UI & UX
  google_fonts: ^6.2.1
  vibration: ^2.0.1

  # Security & Permissions
  permission_handler: ^11.3.1
  flutter_secure_storage: ^9.2.4
  share_plus: ^12.0.1
  path_provider: ^2.1.5
  tflite_flutter: ^0.12.1
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  battery_plus: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
