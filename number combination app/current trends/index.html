<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Viral Reddit Tracker - Track trending content from Reddit in real-time across multiple categories including news, politics, memes, and viral videos.">
    <title>Viral Reddit Tracker | Real-Time Trending Content Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Header Section -->
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <span class="logo-icon">🔥</span>
                <h1>Viral Reddit Tracker</h1>
            </div>
            <p class="tagline">Real-time trending content from Reddit</p>
        </div>
    </header>

    <!-- Navigation / Category Switcher -->
    <nav class="nav-container">
        <div class="nav-scroll">
            <button class="nav-btn active" data-subreddit="popular" data-sort="hot">
                <span class="nav-icon">🌐</span>
                <span class="nav-text">All Viral</span>
            </button>
            <button class="nav-btn" data-subreddit="worldnews+news+technology" data-sort="hot">
                <span class="nav-icon">📰</span>
                <span class="nav-text">News</span>
            </button>
            <button class="nav-btn" data-subreddit="politics" data-sort="hot">
                <span class="nav-icon">🏛️</span>
                <span class="nav-text">Politics</span>
            </button>
            <button class="nav-btn" data-subreddit="memes+dankmemes+wholesomememes" data-sort="hot">
                <span class="nav-icon">😂</span>
                <span class="nav-text">Memes</span>
            </button>
            <button class="nav-btn" data-subreddit="videos+publicfreakout" data-sort="hot">
                <span class="nav-icon">🎬</span>
                <span class="nav-text">Videos</span>
            </button>
        </div>
    </nav>

    <!-- Sort Options -->
    <div class="sort-container">
        <span class="sort-label">Sort by:</span>
        <div class="sort-buttons">
            <button class="sort-btn active" data-sort="hot">🔥 Hot</button>
            <button class="sort-btn" data-sort="top">⬆️ Top</button>
            <button class="sort-btn" data-sort="new">🆕 New</button>
            <button class="sort-btn" data-sort="rising">📈 Rising</button>
        </div>
    </div>

    <!-- Loading Indicator -->
    <div class="loading-container" id="loading">
        <div class="loading-spinner"></div>
        <p class="loading-text">Fetching viral content...</p>
    </div>

    <!-- Error Message -->
    <div class="error-container" id="error" style="display: none;">
        <span class="error-icon">⚠️</span>
        <p class="error-text">Failed to load content. Please try again.</p>
        <button class="retry-btn" id="retryBtn">Retry</button>
    </div>

    <!-- Main Content Grid -->
    <main class="main-content">
        <div class="posts-grid" id="postsGrid">
            <!-- Posts will be dynamically inserted here -->
        </div>
    </main>

    <!-- Load More Button -->
    <div class="load-more-container" id="loadMoreContainer" style="display: none;">
        <button class="load-more-btn" id="loadMoreBtn">
            <span class="load-more-text">Load More Posts</span>
            <span class="load-more-spinner" style="display: none;"></span>
        </button>
    </div>

    <!-- Back to Top Button -->
    <button class="back-to-top" id="backToTop" aria-label="Back to top">
        ↑
    </button>

    <!-- Footer -->
    <footer class="footer">
        <p>Data sourced from Reddit's public API • Not affiliated with Reddit Inc.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
