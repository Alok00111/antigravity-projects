<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            width: 300px;
            padding: 15px;
            font-family: sans-serif;
        }

        h2 {
            margin-top: 0;
            color: #333;
        }

        .stats {
            margin: 15px 0;
            font-size: 14px;
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        #startBtn {
            background-color: #4CAF50;
            color: white;
        }

        #stopBtn {
            background-color: #f44336;
            color: white;
        }

        #resumeBtn {
            background-color: #2196F3;
            color: white;
            display: none;
            margin-top: 10px;
            width: 100%;
        }

        .status {
            margin-top: 10px;
            color: #666;
            font-size: 12px;
        }
    </style>
</head>

<body>
    <h2>Polymarket Scraper</h2>
    <div class="stats">
        <div>Unique Markets: <strong id="marketCount">0</strong></div>
    </div>
    <div class="controls">
        <button id="startBtn">Scrape Home</button>
        <button id="crawlBtn" style="background-color: #FF9800; color: white;">Deep Crawl (Auto)</button>
    </div>
    <button id="stopBtn" style="margin-top: 10px; width: 100%;">Stop All</button>
    <div class="status" id="statusText">Ready</div>
    <script src="popup.js"></script>
</body>

</html>
